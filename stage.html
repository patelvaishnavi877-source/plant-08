<!-- This page asks for the plant's current stage and navigates to the guide -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Stage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-weight: 600;
            margin-bottom: 20px;
            color: #4a7c59;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        select:focus {
            border-color: #4a7c59;
            outline: none;
        }
        button {
            background: #4a7c59;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #3a5f47;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>What's the Stage of Your <span id="plantNameDisplay"></span>?</h1>
        <select id="stage">
            <option value="">Select Stage</option>
            <option value="seed">Seed</option>
            <option value="plant">Plant</option>
            <option value="tree">Tree</option>
        </select>
        <button onclick="goToGuide()">Get Guidance</button>
    </div>
    <script>
        document.getElementById('plantNameDisplay').textContent = localStorage.getItem('plantName') || 'Plant';
        function goToGuide() {
            const stage = document.getElementById('stage').value;
            if (stage) {
                localStorage.setItem('plantStage', stage);
                window.location.href = 'Guide.html';
            } else {
                alert('Please select a stage!');
            }
        }
    </script>
</body>
</html>
